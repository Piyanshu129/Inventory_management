version: "3.9"

services:
  # ── ChromaDB Vector Store ─────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "8001:8000"          # expose ChromaDB on host port 8001
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Inventory Agent API ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      # Persist SQLite database across restarts
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Override ChromaDB connection to use the Docker service
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000

volumes:
  chroma_data:
